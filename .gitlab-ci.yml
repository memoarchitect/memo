stages:
  - build
  - test
  - publish
  - docs

# sysand is distributed on PyPI (https://pypi.org/project/sysand/) — the same
# external, conformant SysML v2 / KerML tool used locally. Pin it so the
# portability gate is reproducible.
variables:
  SYSAND_VERSION: "0.0.9"

.sysand_setup: &sysand_setup
  image: python:3.12-slim
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends unzip >/dev/null
    - pip install --quiet "sysand==${SYSAND_VERSION}"
    - sysand --version

# ── Portability gate ─────────────────────────────────────────────────────────
# Proves the constraint-bearing ontology parses in an external SysML v2 tool.
# scripts/build-kpar.sh regenerates each project's .meta.json and runs the real
# `sysand build`; any external-parser error fails the pipeline, so a non-portable
# ontology can never be released.
build:
  stage: build
  <<: *sysand_setup
  script:
    - bash scripts/build-kpar.sh
    - mkdir -p dist
    - cp output/*.kpar dist/ || true
    - cp src/methodology/output/*.kpar dist/ || true
  artifacts:
    paths:
      - dist/*.kpar
    expire_in: 30 days

# ── Published-package + validating-project gate ─────────────────────────────
# Build the current tools mirror against this ontology checkout so Phase 1 can
# exercise the real CLI without depending on a published @memoarchitect/tools.
test:
  stage: test
  image: node:20-bookworm-slim
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git >/dev/null
    - corepack enable
    - git clone --depth 1 https://github.com/memoarchitect/memo-tools.git /tmp/memo-tools
    - rm -rf /tmp/memo-tools/memo
    - ln -s "$CI_PROJECT_DIR" /tmp/memo-tools/memo
    - cd /tmp/memo-tools && pnpm install --frozen-lockfile
    - pnpm run build
  script:
    - cd "$CI_PROJECT_DIR"
    - pnpm test
    - npm pack --dry-run
    - cp -R template .phase1-template
    - sed -i 's/{{name}}/phase1-template/g' .phase1-template/memo.package.yaml .phase1-template/src/catalog/starter.sysml
    - node /tmp/memo-tools/packages/tools/lib/bin/memo.js validate .phase1-template
    - node /tmp/memo-tools/packages/tools/lib/bin/memo.js validate examples/gpca-pump
  after_script:
    - rm -rf "$CI_PROJECT_DIR/.phase1-template"

# ── Release ──────────────────────────────────────────────────────────────────
# On a version tag (v*), rebuild the .kpar archives and upload them to this
# project's GitLab generic package registry under package `memo-sysmlv2` at the
# tag version. Installable as a sysand data dependency from the registry URL.
publish:
  stage: publish
  <<: *sysand_setup
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
  script:
    - apt-get install -y --no-install-recommends curl >/dev/null
    - bash scripts/build-kpar.sh
    - VERSION="${CI_COMMIT_TAG#v}"
    - |
      for kpar in output/*.kpar src/methodology/output/*.kpar; do
        [ -f "$kpar" ] || continue
        fname="$(basename "$kpar")"
        echo "Uploading $fname -> generic/memo-sysmlv2/$VERSION/$fname"
        curl --fail --silent --show-error \
          --header "JOB-TOKEN: $CI_JOB_TOKEN" \
          --upload-file "$kpar" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/memo-sysmlv2/${VERSION}/${fname}"
      done

pages:
  stage: docs
  image: python:3.12-slim
  script:
    - pip install --quiet "mkdocs>=1.6" "mkdocs-material>=9.5" "pymdown-extensions>=10.0"
    - mkdocs build --strict --site-dir public
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
