#:schema https://docs.sensmetry.com/schemas/latest/syside.schema.json

# When this nested repository is opened directly in VS Code, its `.git` file is
# a SysIDE root marker. Include the canonical source tree explicitly so its
# path-derived source packages and memo:: namespace facade resolve as one model.
include = [
    "src",
]

exclude = [
    "node_modules",
    "packages",
    "output",
    ".sysand",
]
