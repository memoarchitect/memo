<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="420" viewBox="0 0 1100 420" role="img" aria-labelledby="title desc">
  <title id="title">Temperature alarm internal block diagram</title>
  <desc id="desc">An internal block diagram with a temperature sensor assembly sending a temperature measurement to evaluation software, which sends an alarm command to an audible alarm assembly.</desc>
  <defs><linearGradient id="background" x1="0" x2="1"><stop stop-color="#f7fbfd"/><stop offset="1" stop-color="#eefaf6"/></linearGradient><marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0L9 4.5L0 9Z" fill="#438ed0"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#082744" flood-opacity=".10"/></filter></defs>
  <rect width="1100" height="420" rx="24" fill="url(#background)"/>
  <text x="48" y="53" font-family="Nunito,Arial,sans-serif" font-size="19" font-weight="850" fill="#082744">INTERNAL BLOCK DIAGRAM · REALIZING THE FUNCTIONAL FLOW</text>
  <text x="48" y="80" font-family="Nunito,Arial,sans-serif" font-size="14" fill="#5c7188">This view maps the function “evaluate temperature → notify clinician” onto cooperating software and hardware parts.</text>
  <rect x="62" y="116" width="976" height="240" rx="18" fill="#fff" stroke="#b9d8e8" stroke-width="2"/>
  <text x="90" y="148" font-family="JetBrains Mono,monospace" font-size="14" font-weight="700" fill="#0a8d76">temperature_alarm : System</text>
  <g font-family="Nunito,Arial,sans-serif"><rect x="108" y="193" width="220" height="102" rx="14" fill="#fff3e8" stroke="#ef9b51" stroke-width="2" filter="url(#shadow)"/><text x="128" y="224" font-size="13" font-weight="850" fill="#88501f">HARDWARE ASSEMBLY</text><text x="128" y="250" font-size="17" font-weight="850" fill="#88501f">Temperature sensor</text><text x="128" y="274" font-size="13" fill="#5c7188">measures patient temperature</text>
  <rect x="440" y="193" width="220" height="102" rx="14" fill="#eaf4fd" stroke="#438ed0" stroke-width="2" filter="url(#shadow)"/><text x="460" y="224" font-size="13" font-weight="850" fill="#17557f">SOFTWARE ITEM</text><text x="460" y="250" font-size="17" font-weight="850" fill="#17557f">Evaluation software</text><text x="460" y="274" font-size="13" fill="#5c7188">evaluates limit and timing</text>
  <rect x="772" y="193" width="220" height="102" rx="14" fill="#e3faf3" stroke="#2dd4a8" stroke-width="2" filter="url(#shadow)"/><text x="792" y="224" font-size="13" font-weight="850" fill="#07604f">HARDWARE ASSEMBLY</text><text x="792" y="250" font-size="17" font-weight="850" fill="#07604f">Audible alarm</text><text x="792" y="274" font-size="13" fill="#5c7188">notifies the clinician</text></g>
  <path d="M328 244H436" stroke="#438ed0" stroke-width="3" marker-end="url(#arrow)"/><path d="M660 244H768" stroke="#438ed0" stroke-width="3" marker-end="url(#arrow)"/>
  <g font-family="JetBrains Mono,monospace" font-size="12" fill="#17557f"><text x="349" y="229">temperature</text><text x="375" y="245">measurement</text><text x="685" y="229">alarm</text><text x="697" y="245">command</text></g>
  <text x="62" y="390" font-family="Nunito,Arial,sans-serif" font-size="13" fill="#5c7188">Each connector is an interface-level exchange; allocation and verification links remain anchored on the function in the model.</text>
</svg>
