<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="330" viewBox="0 0 1100 330" role="img" aria-labelledby="title desc">
  <title id="title">Temperature alarm requirement argument</title>
  <desc id="desc">A clinical goal derives a system requirement. The Evaluate Temperature logical function satisfies it, is allocated to software and hardware, is checked by verification, and is examined for a missed-temperature hazard.</desc>
  <defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0L9 4.5L0 9Z" fill="#5c7188"/></marker></defs>
  <rect width="1100" height="330" rx="24" fill="#f7fbfd"/>
  <text x="44" y="49" font-family="Nunito,Arial,sans-serif" font-size="18" font-weight="800" fill="#082744">MODEL SLICE · FUNCTION-ANCHORED TRACEABILITY</text>
  <g font-family="Nunito,Arial,sans-serif">
    <rect x="44" y="105" width="193" height="94" rx="14" fill="#f0edff" stroke="#8971dc"/><text x="61" y="136" font-size="13" font-weight="800" fill="#4c3a98">CLINICAL GOAL</text><text x="61" y="164" font-size="16" font-weight="800" fill="#4c3a98">Maintain safe temperature</text><text x="61" y="185" font-size="12" fill="#5c7188">for the monitored patient</text>
    <rect x="323" y="105" width="214" height="94" rx="14" fill="#eaf4fd" stroke="#438ed0"/><text x="340" y="136" font-size="13" font-weight="800" fill="#17557f">SYSTEM REQUIREMENT</text><text x="340" y="164" font-size="16" font-weight="800" fill="#17557f">Alarm above limit</text><text x="340" y="185" font-size="12" fill="#5c7188">event-driven EARS statement</text>
    <rect x="623" y="105" width="190" height="94" rx="14" fill="#fff3e8" stroke="#ef9b51"/><text x="640" y="136" font-size="13" font-weight="800" fill="#88501f">LOGICAL FUNCTION</text><text x="640" y="164" font-size="16" font-weight="800" fill="#88501f">Evaluate temperature</text><text x="640" y="185" font-size="12" fill="#5c7188">anchor for the model</text>
    <rect x="866" y="105" width="190" height="94" rx="14" fill="#e3faf3" stroke="#2dd4a8"/><text x="883" y="136" font-size="13" font-weight="800" fill="#07604f">VERIFICATION CASE</text><text x="883" y="164" font-size="16" font-weight="800" fill="#07604f">Alarm test</text><text x="883" y="185" font-size="12" fill="#5c7188">checks the requirement</text>
    <rect x="476" y="238" width="185" height="57" rx="12" fill="#fff0ef" stroke="#ea6b61"/><text x="493" y="261" font-size="12" font-weight="800" fill="#94423d">HAZARD + RISK CONTROL</text><text x="493" y="281" font-size="13" font-weight="800" fill="#94423d">missed temperature / check</text>
  </g>
  <g stroke="#5c7188" stroke-width="2.5" fill="none" marker-end="url(#arrow)"><path d="M237 152H319"/><path d="M537 152H619"/><path d="M813 152H862"/><path d="M548 202v32"/></g>
  <g font-family="JetBrains Mono,monospace" font-size="11" fill="#5c7188"><text x="257" y="141">DerivesFrom</text><text x="558" y="141">SatisfiedBy</text><text x="820" y="141">VerifiedBy</text><text x="560" y="225">MitigatesHazard</text></g>
</svg>
