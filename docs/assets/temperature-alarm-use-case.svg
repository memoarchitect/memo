<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="480" viewBox="0 0 1100 480" role="img" aria-labelledby="title desc">
  <title id="title">Temperature alarm use-case context</title>
  <desc id="desc">A clinician has the goal of maintaining safe patient temperature. In the use case, the clinician monitors temperature status and responds to a temperature alert.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#eaf4fd"/><stop offset="1" stop-color="#e3faf3"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#082744" flood-opacity=".12"/></filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0L9 4.5L0 9Z" fill="#438ed0"/></marker>
  </defs>
  <rect width="1100" height="480" rx="24" fill="url(#bg)"/>
  <text x="54" y="58" font-family="Nunito,Arial,sans-serif" font-size="19" font-weight="800" fill="#082744">USE CASE / CLINICAL GOAL · MAINTAIN SAFE TEMPERATURE</text>
  <text x="54" y="86" font-family="Nunito,Arial,sans-serif" font-size="14" fill="#5c7188">The clinician’s goal is expressed through this use case and its operational steps.</text>
  <g transform="translate(110 171)" fill="none" stroke="#0a3452" stroke-linecap="round" stroke-width="7">
    <circle cx="35" cy="25" r="19"/><path d="M35 45v67M1 71l34-26 34 26M13 151l22-39 22 39"/>
  </g>
  <text x="104" y="350" font-family="Nunito,Arial,sans-serif" font-size="18" font-weight="800" fill="#082744">Clinician</text>
  <text x="83" y="375" font-family="Nunito,Arial,sans-serif" font-size="14" fill="#5c7188">responds to alert</text>
  <rect x="334" y="119" width="584" height="281" rx="20" fill="#fff" stroke="#b9d8e8" stroke-width="2" filter="url(#shadow)"/>
  <text x="365" y="157" font-family="JetBrains Mono,monospace" font-size="14" font-weight="700" fill="#0a8d76">temperature_monitoring system</text>
  <ellipse cx="621" cy="220" rx="188" ry="44" fill="#eaf4fd" stroke="#438ed0" stroke-width="2"/>
  <text x="621" y="216" text-anchor="middle" font-family="Nunito,Arial,sans-serif" font-size="18" font-weight="800" fill="#17557f">Monitor temperature status</text>
  <text x="621" y="240" text-anchor="middle" font-family="Nunito,Arial,sans-serif" font-size="13" fill="#5c7188">clinician sees the current status</text>
  <ellipse cx="621" cy="320" rx="188" ry="44" fill="#e3faf3" stroke="#2dd4a8" stroke-width="2"/>
  <text x="621" y="316" text-anchor="middle" font-family="Nunito,Arial,sans-serif" font-size="18" font-weight="800" fill="#07604f">Respond to temperature alert</text>
  <text x="621" y="340" text-anchor="middle" font-family="Nunito,Arial,sans-serif" font-size="13" fill="#5c7188">clinician acknowledges and responds</text>
  <path d="M171 240H425" stroke="#438ed0" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M171 290C274 320 344 320 425 320" stroke="#438ed0" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M621 264v12" stroke="#0a8d76" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="54" y="439" font-family="Nunito,Arial,sans-serif" font-size="13" fill="#5c7188">The use case expresses the clinician’s goal and interaction. Functional behavior is modeled in the next view.</text>
</svg>
