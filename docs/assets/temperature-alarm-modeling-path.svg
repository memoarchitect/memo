<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">Function-anchored modeling path</title>
  <desc id="desc">A user goal leads to a use case, workflow, and operational scenario. A functional flow becomes the anchor from which requirements, risk, verification, and software and hardware architecture are developed.</desc>
  <defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0L9 4.5L0 9Z" fill="#5c7188"/></marker></defs>
  <rect width="1100" height="520" rx="24" fill="#f7fbfd"/>
  <text x="48" y="55" font-family="Nunito,Arial,sans-serif" font-size="20" font-weight="850" fill="#082744">FUNCTION-ANCHORED MODELING PATH</text>
  <text x="48" y="83" font-family="Nunito,Arial,sans-serif" font-size="14" fill="#5c7188">Follow the clinical story first; use functions to connect requirements, design, risk, and evidence.</text>
  <g font-family="Nunito,Arial,sans-serif" text-anchor="middle">
    <g><rect x="54" y="126" width="176" height="72" rx="13" fill="#f0edff" stroke="#8971dc" stroke-width="2"/><text x="142" y="153" font-size="12" font-weight="800" fill="#4c3a98">USER GOAL</text><text x="142" y="178" font-size="15" font-weight="800" fill="#4c3a98">Maintain safe temperature</text></g>
    <g><rect x="275" y="126" width="152" height="72" rx="13" fill="#eaf4fd" stroke="#438ed0" stroke-width="2"/><text x="351" y="153" font-size="12" font-weight="800" fill="#17557f">USE CASE</text><text x="351" y="178" font-size="15" font-weight="800" fill="#17557f">Monitor and respond</text></g>
    <g><rect x="472" y="126" width="152" height="72" rx="13" fill="#eaf4fd" stroke="#438ed0" stroke-width="2"/><text x="548" y="153" font-size="12" font-weight="800" fill="#17557f">WORKFLOW</text><text x="548" y="178" font-size="15" font-weight="800" fill="#17557f">Observe → respond</text></g>
    <g><rect x="669" y="126" width="176" height="72" rx="13" fill="#eaf4fd" stroke="#438ed0" stroke-width="2"/><text x="757" y="153" font-size="12" font-weight="800" fill="#17557f">OPERATIONAL SCENARIO</text><text x="757" y="178" font-size="15" font-weight="800" fill="#17557f">High-temperature event</text></g>
    <g><rect x="354" y="260" width="392" height="86" rx="16" fill="#e3faf3" stroke="#2dd4a8" stroke-width="3"/><text x="550" y="292" font-size="13" font-weight="850" fill="#07604f">FUNCTIONAL FLOW · ANCHOR</text><text x="550" y="321" font-size="17" font-weight="850" fill="#07604f">Evaluate temperature → notify clinician</text></g>
    <g><rect x="58" y="410" width="176" height="66" rx="13" fill="#eaf4fd" stroke="#438ed0" stroke-width="2"/><text x="146" y="436" font-size="12" font-weight="800" fill="#17557f">REQUIREMENTS</text><text x="146" y="460" font-size="14" font-weight="800" fill="#17557f">EARS system claims</text></g>
    <g><rect x="282" y="410" width="176" height="66" rx="13" fill="#fff0ef" stroke="#ea6b61" stroke-width="2"/><text x="370" y="436" font-size="12" font-weight="800" fill="#94423d">RISK</text><text x="370" y="460" font-size="14" font-weight="800" fill="#94423d">Hazards and controls</text></g>
    <g><rect x="642" y="410" width="176" height="66" rx="13" fill="#fff3e8" stroke="#ef9b51" stroke-width="2"/><text x="730" y="436" font-size="12" font-weight="800" fill="#88501f">ARCHITECTURE</text><text x="730" y="460" font-size="14" font-weight="800" fill="#88501f">Software and hardware</text></g>
    <g><rect x="866" y="410" width="176" height="66" rx="13" fill="#e3faf3" stroke="#2dd4a8" stroke-width="2"/><text x="954" y="436" font-size="12" font-weight="800" fill="#07604f">VERIFICATION</text><text x="954" y="460" font-size="14" font-weight="800" fill="#07604f">Tests and evidence</text></g>
  </g>
  <g stroke="#5c7188" stroke-width="2.5" fill="none" marker-end="url(#arrow)"><path d="M230 162H271"/><path d="M427 162H468"/><path d="M624 162H665"/><path d="M757 202C710 232 655 253 600 260"/><path d="M468 346L192 406"/><path d="M500 346L408 406"/><path d="M600 346L698 406"/><path d="M640 346L910 406"/></g>
</svg>
